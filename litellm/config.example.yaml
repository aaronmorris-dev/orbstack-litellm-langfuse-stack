general_settings:
  master_key: os.environ/LITELLM_MASTER_KEY
  database_url: os.environ/DATABASE_URL
  store_model_in_db: true
  store_prompts_in_spend_logs: false
  maximum_spend_logs_retention_period: "30d"
  proxy_batch_write_at: 10
  database_connection_pool_limit: 10
  allow_requests_on_db_unavailable: true

litellm_settings:
  callbacks: ["langfuse_enrich.proxy_handler_instance", "langfuse_otel"]
  request_timeout: 600
  num_retries: 3
  retry_after: 1
  set_verbose: false
  json_logs: true
  cache: true
  cache_params:
    type: redis
    host: gateway-redis
    port: 6379
    ttl: 3600
    supported_call_types:
      - acompletion
      - completion
      - aembedding
      - embedding

router_settings:
  routing_strategy: simple-shuffle
  allowed_fails: 3
  cooldown_time: 30
  redis_host: gateway-redis
  redis_port: 6379

